# /etc/nginx/sites-available/scanner
# Reverse proxy + TLS termination in front of Gunicorn on an EC2 instance.
server {
    listen 80;
    server_name _;   # replace with your domain

    # Must be >= MAX_UPLOAD_MB in the app config.
    client_max_body_size 64M;

    location /static/ {
        alias /opt/scanner/app/static/;
        expires 7d;
        access_log off;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 200s;
    }
}

# After pointing a domain here, enable HTTPS with:
#   sudo certbot --nginx -d yourdomain.com
